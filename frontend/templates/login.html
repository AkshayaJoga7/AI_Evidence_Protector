<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AI Evidence Protector</title>
  <link rel="shortcut icon" href="{{ url_for('views.favicon') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="{{ url_for('views.index') }}" class="nav-brand">
      <img src="{{ url_for('views.logo') }}" alt="AI Evidence Logo">
      <span>AI Evidence Protector</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ url_for('views.index') }}" class="nav-link">Home</a></li>
      <li><a href="{{ url_for('views.dashboard') }}" class="nav-link">Dashboard</a></li>
      <li><a href="{{ url_for('views.login') }}" class="nav-link active btn btn-secondary" style="padding:0.4rem 1rem;">Login</a></li>
      <li><a href="{{ url_for('views.register') }}" class="nav-link btn btn-primary" style="padding:0.4rem 1rem; color: #0a0d14;">Sign Up</a></li>
      <li><a href="{{ url_for('views.emergency') }}" class="nav-link sos-btn">🚨 SOS PANIC</a></li>
    </ul>
  </nav>

  <!-- Login Form Container -->
  <div class="auth-wrapper">
    <div class="glass-card auth-card">
      <div class="auth-header">
        <img src="{{ url_for('views.logo') }}" alt="Logo">
        <h2>Welcome Back</h2>
        <p>Sign in to access your secure evidence vault</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-container">
            <input type="email" id="email" class="form-input" placeholder="agent@evidence.sec" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-container">
            <input type="password" id="password" class="form-input" placeholder="••••••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Secure Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('views.register') }}">Sign Up here</a>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
