<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency SOS | AI Evidence Protector</title>
  <link rel="shortcut icon" href="{{ url_for('views.favicon') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/emergency.css') }}">
</head>
<body>

  <!-- Consistent Authenticated Navbar -->
  <nav class="navbar">
    <a href="{{ url_for('views.index') }}" class="nav-brand">
      <img src="{{ url_for('views.logo') }}" alt="AI Evidence Logo">
      <span>AI Evidence Protector</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ url_for('views.dashboard') }}" class="nav-link">Dashboard</a></li>
      <li><a href="{{ url_for('views.evidence') }}" class="nav-link">Evidence Vault</a></li>
      <li><a href="{{ url_for('views.report') }}" class="nav-link">Reports</a></li>
      <li><a href="{{ url_for('views.profile') }}" class="nav-link">Profile</a></li>
      <li><a href="{{ url_for('views.emergency') }}" class="nav-link active sos-btn">🚨 SOS PANIC</a></li>
    </ul>
  </nav>

  <!-- Emergency Dispatch Screen -->
  <main class="main-container">
    <div class="emergency-container">
      <h1 style="font-size: 2.5rem; color: var(--color-danger);">Distress & Panic Trigger</h1>
      <p style="color: var(--text-muted); max-width: 540px; margin-top: 0.5rem;">
        Pressing the emergency button instantly captures your exact GPS location, timestamps the incident, and transmits distress signals.
      </p>

      <div class="sos-trigger-outer">
        <div class="sos-pulse-ring"></div>
        <button id="sos-trigger-btn" class="sos-trigger-btn">
          <span>TRIGGER</span>
          <span style="font-size: 1.25rem;">SOS NOW</span>
        </button>
      </div>

      <div class="location-badge">
        <div class="location-dot"></div>
        <span id="location-display">Acquiring GPS Satellite Connection...</span>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/location.js') }}"></script>
  <script src="{{ url_for('static', filename='js/emergency.js') }}"></script>
</body>
</html>
