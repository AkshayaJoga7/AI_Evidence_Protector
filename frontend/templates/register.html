<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Account | AI Evidence Protector</title>
  <link rel="shortcut icon" href="../public/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <img src="../public/logo.png" alt="AI Evidence Logo">
      <span>AI Evidence Protector</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="login.html" class="nav-link">Login</a></li>
      <li><a href="emergency.html" class="nav-link sos-btn">🚨 SOS PANIC</a></li>
    </ul>
  </nav>

  <!-- Register Container -->
  <div class="auth-wrapper">
    <div class="glass-card auth-card">
      <div class="auth-header">
        <img src="../public/logo.png" alt="Logo">
        <h2>Create Security Account</h2>
        <p>Set up encrypted storage & emergency SOS alerts</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="agent_john" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="john@evidence.sec" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="full_name">Full Name</label>
          <input type="text" id="full_name" class="form-input" placeholder="John Doe">
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone Number (Emergency Alerts)</label>
          <input type="tel" id="phone" class="form-input" placeholder="+1 555-0199">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Register Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="../static/js/register.js"></script>
</body>
</html>
